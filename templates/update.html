<!doctype html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>정글위키</title>

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css" />
  <script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>

  <script src="/static/jungle-nav.js"></script>
</head>

<body>
  <jungle-nav logo-text="정글 위키" logo-href="/"></jungle-nav>

  <div class="max-w-5xl mx-auto p-10 font-sans text-gray-900">

    <div class="flex justify-between items-baseline mb-8">
      <h1 id="page-title" class="text-5xl font-extrabold tracking-tight"></h1>
      <div class="text-gray-400 text-sm">
        <span>수정일 26.03.04</span>
        <span class="ml-2">v1</span>
      </div>
    </div>

    <div class="flex flex-col md:flex-row gap-10">

      <div class="flex-1 flex flex-col">
        <input type="text" id="title-input" placeholder="제목을 입력하세요"
          class="h-14 px-4 text-gray-800 font-bold bg-white outline-none border border-gray-300 placeholder-gray-500 w-full rounded-md focus:border-gray-800 transition-colors mb-4" />

        <div id="editor" class="bg-white rounded-md overflow-hidden"></div>

        <div class="flex justify-center mt-10">
          <button type="button" id="submit-btn"
            class="border border-gray-400 bg-white px-16 py-2.5 text-gray-800 hover:bg-gray-50 font-medium transition-colors cursor-pointer rounded-md">
            수정 확인
          </button>
        </div>
      </div>

      <div class="w-full md:w-48 border border-dashed border-gray-300 rounded-md p-5 h-max bg-white">
        <h3 class="text-xs font-bold mb-3 text-gray-800">같이 본 키워드</h3>
        <ul class="list-disc list-inside text-xs text-gray-800 space-y-1.5 pl-1">
          <li>session</li>
          <li>cookie</li>
        </ul>
      </div>

    </div>
  </div>

  <script>
    // ✅ localStorage에서 카드 데이터 꺼내기
    const card = JSON.parse(localStorage.getItem('edit_card'));

    if (!card) {
      alert('수정할 카드 정보가 없습니다.');
      window.location.href = '/';
    }

    // 제목 채우기
    document.getElementById('title-input').value = card.title;
    document.getElementById('page-title').textContent = card.title;

    // 에디터 초기화 + 내용 채우기
    const editor = new toastui.Editor({
      el: document.querySelector('#editor'),
      height: '500px',
      initialEditType: 'wysiwyg',
      previewStyle: 'vertical',
      initialValue: card.content,
    });

    // ✅ 수정 확인 버튼 → PATCH 요청
    document.getElementById('submit-btn').addEventListener('click', async () => {
      const title = document.getElementById('title-input').value.trim();
      const content = editor.getMarkdown();

      if (!title) { alert('제목을 입력해주세요.'); return; }
      if (!content) { alert('내용을 입력해주세요.'); return; }

      try {
        const res = await fetch(`/api/cards/${card._id}`, {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${localStorage.getItem('access_token')}`
          },
          body: JSON.stringify({ title, content })
        });

        const data = await res.json();

        if (data.result === 'success') {
          alert('수정이 완료되었습니다.');
          localStorage.removeItem('edit_card');
          window.location.href = '/detail/' + card._id;
        } else {
          alert(data.msg || '수정에 실패했습니다.');
        }
      } catch (err) {
        console.error(err);
        alert('서버와 통신 중 오류가 발생했습니다.');
      }
    });
  </script>
</body>

</html>
