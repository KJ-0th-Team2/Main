<!doctype html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />


  <title>정글위키</title>

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="/static/jungle-nav.js"></script>
</head>

<body>
  <jungle-nav logo-text="정글 위키" logo-href="/"></jungle-nav>

  </div>
  <div class="max-w-4xl mx-auto p-10 font-sans text-gray-900">

    <div class="flex justify-between items-baseline mb-8">
      <h1 class="text-5xl font-extrabold tracking-tight">JWT</h1>
      <div class="text-gray-400 text-sm">
        <span>수정일 26.03.04</span>
        <span class="ml-2">v1</span>
      </div>
    </div>

    <div class="flex flex-col md:flex-row gap-8 mb-4">

      <div class="flex-1 flex flex-col justify-between min-h-[250px]">
        <p class="text-xl font-medium tracking-tight mt-2">
          이론입니다. 어쩌구 저쩌구이론입니다. 어쩌구 저쩌구
        </p>

        <div class="flex justify-end gap-3 text-gray-700 mt-8">
          <svg class="w-6 h-6 cursor-pointer hover:text-gray-900" fill="none" stroke="currentColor" viewBox="0 0 24 24"
            xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z">
            </path>
          </svg>
          <svg class="w-6 h-6 cursor-pointer hover:text-gray-900" fill="none" stroke="currentColor" viewBox="0 0 24 24"
            xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
        </div>
      </div>

      <div class="w-full md:w-52 border border-dashed border-gray-400 rounded-md p-5 h-max">
        <h3 class="text-sm font-bold mb-3 text-gray-800">같이 본 키워드</h3>
        <ul class="list-disc list-inside text-sm text-gray-800 space-y-1">
          <li>session</li>
          <li>cookie</li>
        </ul>
      </div>
    </div>

    <hr class="border-gray-400 my-4" />

    <div>
      <h2 class="text-lg font-bold mb-3">comment</h2>

      <div class="space-y-1.5" id="comment-container">
        <div class="comment-item">
          <div class="flex items-center text-sm group">
            <div class="flex items-center">
              <span class="font-bold text-gray-800 shrink-0">정글러</span>
              <span class="text-gray-300 text-xs ml-2 font-medium shrink-0">26.3.4</span>
              <span class="text-gray-400 mx-2 text-xs shrink-0">|</span>
              <span class="comment-text text-gray-800">덕분에 이해했어요</span>
            </div>

            <div class="flex items-center ml-3 gap-2 font-bold select-none">
              <button onclick="toggleReplyForm(this)" title="작성"
                class="text-gray-400 hover:text-blue-500 cursor-pointer text-base">＋</button>
              <button onclick="editComment(this)" title="수정"
                class="text-gray-400 hover:text-gray-900 cursor-pointer text-[10px] border border-gray-300 px-1 rounded">EDIT</button>
              <button title="삭제" class="text-gray-400 hover:text-red-500 cursor-pointer text-sm">×</button>
            </div>
          </div>
        </div>

        <div class="comment-item ml-3">
          <div class="flex items-center text-sm group">
            <div class="flex items-center">
              <span class="text-gray-500 mr-1.5 text-xs font-bold shrink-0">ㄴ</span>
              <span class="font-bold text-gray-800 shrink-0">정글러</span>
              <span class="text-gray-300 text-xs ml-2 font-medium shrink-0">26.3.4</span>
              <span class="text-gray-400 mx-2 text-xs shrink-0">|</span>
              <span class="comment-text text-gray-800">정말 유익하네요!</span>
            </div>

            <div class="flex items-center ml-3 gap-2 font-bold select-none">
              <button onclick="toggleReplyForm(this)" title="작성"
                class="text-gray-300 hover:text-blue-500 cursor-pointer text-base">＋</button>
              <button onclick="editComment(this)" title="수정"
                class="text-gray-300 hover:text-gray-900 cursor-pointer text-[9px] border border-gray-200 px-0.5 rounded">EDIT</button>
              <button title="삭제" class="text-gray-300 hover:text-red-500 cursor-pointer text-sm">×</button>
            </div>
          </div>
        </div>
      </div>

      <script>
        // 1. 답글(+) 버튼 기능: 아래에 입력창 생성/삭제
        function toggleReplyForm(btn) {
          const commentItem = btn.closest('.comment-item');
          let replyForm = commentItem.querySelector('.reply-form');

          if (replyForm) {
            replyForm.remove(); // 이미 있으면 닫기
          } else {
            replyForm = document.createElement('div');
            replyForm.className = 'reply-form flex gap-2 mt-2 ml-4';
            replyForm.innerHTML = `
        <input type="text" class="flex-1 border border-gray-300 rounded px-2 py-1 text-sm focus:outline-none focus:border-blue-500" placeholder="답글을 입력하세요...">
        <button onclick="this.parentElement.remove()" class="text-xs text-blue-500 font-bold">등록</button>
        <button onclick="this.parentElement.remove()" class="text-xs text-gray-400">취소</button>
      `;
            commentItem.appendChild(replyForm);
            replyForm.querySelector('input').focus();
          }
        }

        // 2. 수정(EDIT) 버튼 기능: 텍스트를 입력창으로 변경
        function editComment(btn) {
          const commentItem = btn.closest('.comment-item');
          const textSpan = commentItem.querySelector('.comment-text');

          // 이미 수정 중이면 중복 실행 방지
          if (commentItem.querySelector('.edit-input')) return;

          const currentText = textSpan.innerText;
          const input = document.createElement('input');
          input.type = 'text';
          input.value = currentText;
          input.className = 'edit-input border-b border-blue-500 outline-none text-sm text-gray-800 ml-1 bg-blue-50';

          // 기존 텍스트 숨기고 인풋 넣기
          textSpan.style.display = 'none';
          textSpan.parentNode.insertBefore(input, textSpan);
          input.focus();

          // 엔터 치면 저장, ESC 치면 취소
          input.onkeydown = function (e) {
            if (e.key === 'Enter') {
              textSpan.innerText = input.value;
              finishEdit();
            } else if (e.key === 'Escape') {
              finishEdit();
            }
          };

          // 포커스 잃으면 자동 저장
          input.onblur = finishEdit;

          function finishEdit() {
            textSpan.style.display = 'inline';
            input.remove();
          }
        }
      </script>
    </div>

  </div>




</body>

</html>
