<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <title>정글위키</title>
    <style>
      .recent {
        position: absolute;
        right: 50px;
        top: 120px;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <nav class="flex justify-between p-6 bg-white shadow">
      <div class="font-bold text-xl">정글 위키</div>
      <div class="hidden lg:flex gap-x-8">
        <!--알림-->
        <a href="#" class="hover:text-blue-600"
          ><svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="size-6"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0"
            />
          </svg>
        </a>
        <!--검색-->
        <a href="#" class="hover:text-blue-600"
          ><svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="size-6"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"
            />
          </svg>
        </a>
        <!--로그인-->
        <a href="#" class="hover:text-blue-600">로그인1 </a>
      </div>
    </nav>
    <div class="w-full max-w-md mt-10 ml-10">
      <div class="flex gap-x-8 border-b border-gray-200" role="tablist">
        <button
          onclick="switchTab(event, 'theory-content')"
          class="tab-link group relative flex items-center gap-x-2 pb-4 text-lg font-bold text-gray-900 transition-all"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-bookmark"
          >
            <path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z" />
          </svg>
          <span>이론</span>
          <span
            class="indicator absolute bottom-0 left-0 h-0.5 w-full bg-gray-900"
          ></span>
        </button>

        <button
          onclick="switchTab(event, 'project-content')"
          class="tab-link group relative flex items-center gap-x-2 pb-4 text-lg font-medium text-gray-400 hover:text-gray-600 transition-all"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-user"
          >
            <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
          <span>프로젝트</span>
          <span
            class="indicator absolute bottom-0 left-0 h-0.5 w-full bg-transparent"
          ></span>
        </button>
      </div>

      <div class="mt-6">
        <div
          id=""
          class="tab-pane block animate-in fade-in duration-300"
        >
          
        </div>
        <div
          id=""
          class="tab-pane hidden animate-in fade-in duration-300"
        >
          <p class="text-gray-600">
            진행 중인 프로젝트 정보를 여기에 작성하세요.
          </p>
        </div>
      </div>
    </div>

    <form class="recent">
      <select id="" required>
        <option value="" disabled selected>최신순</option>
      </select>
    </form>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 p-6">
  
    <div class="flex flex-col rounded-xl border border-gray-300 bg-white shadow-sm transition-all hover:border-gray-400">
    <div class="p-5 flex-1">
      <h3 class="text-lg font-bold text-gray-900">JWT</h3>
      <p class="mt-2 text-gray-600">내용입니다.</p>
    </div>
    <div class="border-t border-gray-200 px-5 py-3 flex justify-end items-center">
      <div class="flex items-center gap-x-1.5 text-gray-500">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M7.5 8.25h9m-9 3H12m-9.75 1.51c0 1.6 1.123 2.994 2.707 3.227 1.129.166 2.27.293 3.423.379.35.026.67.21.865.501L12 21l2.755-4.133a1.14 1.14 0 0 1 .865-.501 48.172 48.172 0 0 0 3.423-.379c1.584-.233 2.707-1.626 2.707-3.228V6.741c0-1.602-1.123-2.995-2.707-3.228A48.394 48.394 0 0 0 12 3c-2.392 0-4.744.175-7.043.513C3.373 3.746 2.25 5.14 2.25 6.741v6.018Z" />
        </svg>
        <span class="text-sm font-medium">2</span>
      </div>
    </div>
  </div>

  <div class="flex flex-col rounded-xl border border-gray-300 bg-white shadow-sm transition-all hover:border-gray-400">
    <div class="p-5 flex-1">
      <h3 class="text-lg font-bold text-gray-900">JWT</h3>
      <p class="mt-2 text-gray-600">내용입니다.</p>
    </div>
    <div class="border-t border-gray-200 px-5 py-3 flex justify-end items-center">
      <div class="flex items-center gap-x-1.5 text-gray-500">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M7.5 8.25h9m-9 3H12m-9.75 1.51c0 1.6 1.123 2.994 2.707 3.227 1.129.166 2.27.293 3.423.379.35.026.67.21.865.501L12 21l2.755-4.133a1.14 1.14 0 0 1 .865-.501 48.172 48.172 0 0 0 3.423-.379c1.584-.233 2.707-1.626 2.707-3.228V6.741c0-1.602-1.123-2.995-2.707-3.228A48.394 48.394 0 0 0 12 3c-2.392 0-4.744.175-7.043.513C3.373 3.746 2.25 5.14 2.25 6.741v6.018Z" />
        </svg>
        <span class="text-sm font-medium">2</span>
      </div>
    </div>
  </div>
  <div class="flex flex-col rounded-xl border border-gray-300 bg-white shadow-sm transition-all hover:border-gray-400">
    <div class="p-5 flex-1">
      <h3 class="text-lg font-bold text-gray-900">JWT</h3>
      <p class="mt-2 text-gray-600">내용입니다.</p>
    </div>
    <div class="border-t border-gray-200 px-5 py-3 flex justify-end items-center">
      <div class="flex items-center gap-x-1.5 text-gray-500">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M7.5 8.25h9m-9 3H12m-9.75 1.51c0 1.6 1.123 2.994 2.707 3.227 1.129.166 2.27.293 3.423.379.35.026.67.21.865.501L12 21l2.755-4.133a1.14 1.14 0 0 1 .865-.501 48.172 48.172 0 0 0 3.423-.379c1.584-.233 2.707-1.626 2.707-3.228V6.741c0-1.602-1.123-2.995-2.707-3.228A48.394 48.394 0 0 0 12 3c-2.392 0-4.744.175-7.043.513C3.373 3.746 2.25 5.14 2.25 6.741v6.018Z" />
        </svg>
        <span class="text-sm font-medium">2</span>
      </div>
    </div>
  </div>
  

    <script>
      function switchTab(e, contentId) {
        // 1. 모든 콘텐츠 숨기기
        document
          .querySelectorAll(".tab-pane")
          .forEach((p) => p.classList.add("hidden"));

        // 2. 모든 버튼 스타일 초기화
        document.querySelectorAll(".tab-link").forEach((btn) => {
          btn.classList.replace("text-gray-900", "text-gray-400");
          btn.classList.replace("font-bold", "font-medium");
          btn
            .querySelector(".indicator")
            .classList.replace("bg-gray-900", "bg-transparent");
        });

        // 3. 클릭된 탭 활성화
        document.getElementById(contentId).classList.remove("hidden");
        const activeBtn = e.currentTarget;
        activeBtn.classList.replace("text-gray-400", "text-gray-900");
        activeBtn.classList.replace("font-medium", "font-bold");
        activeBtn
          .querySelector(".indicator")
          .classList.replace("bg-transparent", "bg-gray-900");
      }
    </script>
  </body>
</html>
